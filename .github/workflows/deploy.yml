name: Deploy site Worker

# 每次 push 到 main → build dist/ 並用 wrangler 部署「同一個」Worker
# (morning-silence-b900)，等同把原本手動上傳那一步自動化。
# 網址不變：https://morning-silence-b900.karma-story-bmbill.workers.dev
# 推播 Worker (worker/) 不受影響。

on:
  push:
    branches: [main]
  workflow_dispatch: {} # 也允許在 GitHub 網頁手動觸發

permissions:
  contents: read

concurrency:
  group: site-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # build-dist.mjs 只用 Node 內建模組，不需要 npm install
      - name: Build dist/
        run: npm run build

      - name: Deploy to Cloudflare (wrangler deploy)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 用新版 wrangler；舊版 (action 預設 3.90) 對 assets-only worker 支援不穩
          wranglerVersion: "4.103.0"
          # 讀取根目錄 wrangler.toml (name = morning-silence-b900, [assets] = ./dist)
          command: deploy
